components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Legion-issued JWT token (worker or human scope)
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Pre-shared API key

  schemas:
    Meta:
      $ref: './schemas/common.yaml#/Meta'
    MetaCollection:
      $ref: './schemas/common.yaml#/MetaCollection'
    ErrorResponse:
      $ref: './schemas/common.yaml#/ErrorResponse'
    DeletedResponse:
      $ref: './schemas/common.yaml#/DeletedResponse'

    # Task schemas
    TaskObject:
      $ref: './schemas/task.yaml#/TaskObject'
    TaskMetering:
      $ref: './schemas/task.yaml#/TaskMetering'
    TaskInput:
      $ref: './schemas/task.yaml#/TaskInput'
    TaskResponse:
      $ref: './schemas/task.yaml#/TaskResponse'
    TaskCollectionResponse:
      $ref: './schemas/task.yaml#/TaskCollectionResponse'
    TaskLogObject:
      $ref: './schemas/task.yaml#/TaskLogObject'
    TaskLogCollectionResponse:
      $ref: './schemas/task.yaml#/TaskLogCollectionResponse'
    TaskCreatedObject:
      $ref: './schemas/task.yaml#/TaskCreatedObject'
    TaskCreatedResponse:
      $ref: './schemas/task.yaml#/TaskCreatedResponse'

    # Worker schemas
    WorkerObject:
      $ref: './schemas/worker.yaml#/WorkerObject'
    WorkerInput:
      $ref: './schemas/worker.yaml#/WorkerInput'
    WorkerLifecycleInput:
      $ref: './schemas/worker.yaml#/WorkerLifecycleInput'
    WorkerApproveInput:
      $ref: './schemas/worker.yaml#/WorkerApproveInput'
    WorkerRejectInput:
      $ref: './schemas/worker.yaml#/WorkerRejectInput'
    WorkerHealthObject:
      $ref: './schemas/worker.yaml#/WorkerHealthObject'
    WorkerHealthResponse:
      $ref: './schemas/worker.yaml#/WorkerHealthResponse'
    WorkerResponse:
      $ref: './schemas/worker.yaml#/WorkerResponse'
    WorkerCollectionResponse:
      $ref: './schemas/worker.yaml#/WorkerCollectionResponse'

    # Extension schemas
