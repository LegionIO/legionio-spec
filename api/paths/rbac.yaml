      Returns all RBAC runner grants ordered by id.
      Optionally filtered by team.
      Returns 501 if legion-rbac is not installed, 503 if legion-data is not connected.
    operationId: listRbacGrants
    parameters:
      - name: team
        in: query
        required: false
        schema:
          type: string
          example: platform
        description: Filter by team
    responses:
      '200':
        description: Grant list
        content:
          application/json:
            schema:
              $ref: '../schemas/rbac.yaml#/RbacGrantCollectionResponse'
      '401':
