      $ref: './schemas/auth.yaml#/WorkerTokenRequest'
    HumanTokenResponse:
      $ref: './schemas/auth.yaml#/HumanTokenResponse'
    WorkerTokenResponse:
      $ref: './schemas/auth.yaml#/WorkerTokenResponse'
