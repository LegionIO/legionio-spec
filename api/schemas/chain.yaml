ChainObject:
  type: object
  description: >
    A named chain groups a sequence of task relationships into a reusable workflow.
    The Chain data model is not yet implemented; all chain endpoints return 501.
  properties:
    id:
      type: integer
      example: 1
    name:
      type: string
      description: Unique human-readable name for the chain
      example: invoice_processing
    description:
      type: ['string', 'null']
      description: Optional description of the chain's purpose
      example: End-to-end invoice ingestion and approval workflow
    active:
      type: boolean
      example: true
    created_at:
      type: ['string', 'null']
      format: date-time
    updated_at:
      type: ['string', 'null']
      format: date-time
  required:
    - id
    - name

ChainInput:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Unique name for the chain
      example: invoice_processing
    description:
      type: ['string', 'null']
      description: Optional description
      example: End-to-end invoice ingestion and approval workflow
    active:
      type: boolean
      default: true

ChainUpdateInput:
  type: object
  description: All fields are optional. Only provided fields are updated.
  properties:
    name:
      type: string
      example: invoice_processing_v2
    description:
      type: ['string', 'null']
    active:
      type: boolean

ChainResponse:
  type: object
  properties:
    data:
      $ref: './chain.yaml#/ChainObject'
    meta:
      $ref: './common.yaml#/Meta'
  required:
    - data
    - meta

ChainCollectionResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: './chain.yaml#/ChainObject'
    meta:
      $ref: './common.yaml#/MetaCollection'
  required:
    - data
    - meta
