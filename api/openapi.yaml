      $ref: './schemas/extension.yaml#/ExtensionObject'
    RunnerObject:
      $ref: './schemas/extension.yaml#/RunnerObject'
    FunctionObject:
      $ref: './schemas/extension.yaml#/FunctionObject'
    FunctionInvokeInput:
      $ref: './schemas/extension.yaml#/FunctionInvokeInput'
    ExtensionResponse:
      $ref: './schemas/extension.yaml#/ExtensionResponse'
    ExtensionCollectionResponse:
      $ref: './schemas/extension.yaml#/ExtensionCollectionResponse'
    RunnerResponse:
      $ref: './schemas/extension.yaml#/RunnerResponse'
    RunnerCollectionResponse:
      $ref: './schemas/extension.yaml#/RunnerCollectionResponse'
    FunctionResponse:
      $ref: './schemas/extension.yaml#/FunctionResponse'
    FunctionCollectionResponse:
      $ref: './schemas/extension.yaml#/FunctionCollectionResponse'

    # Node schemas
    NodeObject:
      $ref: './schemas/node.yaml#/NodeObject'
    NodeResponse:
      $ref: './schemas/node.yaml#/NodeResponse'
    NodeCollectionResponse:
      $ref: './schemas/node.yaml#/NodeCollectionResponse'

    # Schedule schemas
    ScheduleObject:
      $ref: './schemas/schedule.yaml#/ScheduleObject'
    ScheduleInput:
      $ref: './schemas/schedule.yaml#/ScheduleInput'
    ScheduleUpdateInput:
      $ref: './schemas/schedule.yaml#/ScheduleUpdateInput'
    ScheduleResponse:
      $ref: './schemas/schedule.yaml#/ScheduleResponse'
    ScheduleCollectionResponse:
      $ref: './schemas/schedule.yaml#/ScheduleCollectionResponse'
