  /api/extensions/{id}/runners/{runner_id}/functions/{function_id}/invoke:
    $ref: './paths/extensions.yaml#/~1api~1extensions~1{id}~1runners~1{runner_id}~1functions~1{function_id}~1invoke'

  /api/nodes:
    $ref: './paths/nodes.yaml#/~1api~1nodes'
  /api/nodes/{id}:
    $ref: './paths/nodes.yaml#/~1api~1nodes~1{id}'

  /api/schedules:
    $ref: './paths/schedules.yaml#/~1api~1schedules'
  /api/schedules/{id}:
    $ref: './paths/schedules.yaml#/~1api~1schedules~1{id}'
  /api/schedules/{id}/logs:
