/api/hooks:
  get:
    tags:
      - Hooks
    summary: List registered hooks
    description: >
      Returns all extension webhook hooks registered with the Legion API.
      Each entry includes the extension name, hook name, hook class, default runner,
      and the trigger endpoint path.
    operationId: listHooks
    responses:
      '200':
        description: Registered hook list
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      lex_name:
                        type: string
                        example: lex-github
                      hook_name:
                        type: string
                        example: github_webhook
                      hook_class:
                        type: string
                        example: Legion::Extensions::Github::Hooks::GithubWebhook
                      default_runner:
                        type: string
                        example: Legion::Extensions::Github::Runners::Events
                      route_path:
                        type: string
                        example: github/events
                      endpoint:
                        type: string
                        example: /api/hooks/lex/github/events
                meta:
                  $ref: '../schemas/common.yaml#/Meta'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'

/api/hooks/lex/{path}:
  get:
    tags:
      - Hooks
    summary: Trigger hook via GET
    description: >
      Dispatches a registered extension hook using a GET request. The path parameter
      captures the full route_path registered by the extension (e.g. github/events).
      Returns 404 if no hook is registered for the given path.
      Returns 401 if hook verification fails.
      Returns 422 if the hook cannot route the event.
      Returns 500 if no runner class is configured.
      On success, returns the task_id and status from the dispatched Ingress run.
    operationId: triggerHookGet
    parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
          example: github/events
        description: Hook route path registered by the extension
    responses:
      '200':
        description: Hook dispatched
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    task_id:
                      type: integer
                      example: 4821
                    status:
                      type: string
                      example: queued
                meta:
                  $ref: '../schemas/common.yaml#/Meta'
      '401':
        description: Hook verification failed
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: No hook registered for path
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '422':
        description: Hook could not route this event
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: No runner configured or internal error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'

  post:
    tags:
      - Hooks
    summary: Trigger hook via POST
    description: >
      Dispatches a registered extension hook using a POST request. The path parameter
      captures the full route_path registered by the extension (e.g. github/events).
      The request body is read as the hook payload and passed to the hook class for
      verification and routing. Returns 404 if no hook is registered for the given path.
      Returns 401 if hook verification fails.
      Returns 422 if the hook cannot route the event.
      Returns 500 if no runner class is configured.
      On success, returns the task_id and status from the dispatched Ingress run.
    operationId: triggerHook
    parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
          example: github/events
        description: Hook route path registered by the extension
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
            description: Arbitrary hook payload; structure is hook-specific
    responses:
      '200':
        description: Hook dispatched
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    task_id:
                      type: integer
                      example: 4821
                    status:
                      type: string
                      example: queued
                meta:
                  $ref: '../schemas/common.yaml#/Meta'
      '401':
        description: Hook verification failed
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: No hook registered for path
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '422':
        description: Hook could not route this event
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: No runner configured or internal error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
