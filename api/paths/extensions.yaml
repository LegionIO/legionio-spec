/api/extensions:
  get:
    tags:
      - Extensions
    summary: List extensions
    description: >
      Returns all registered extensions ordered by id.
      Optionally filter to only active extensions via the active query parameter.
    operationId: listExtensions
    parameters:
      - name: active
        in: query
        required: false
        schema:
          type: string
          enum: ['true', 'false']
          example: 'true'
        description: When 'true', return only active extensions
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          example: 20
        description: Maximum number of results to return
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          example: 0
        description: Number of results to skip
    responses:
      '200':
        description: Extension list
        content:
          application/json:
            schema:
              $ref: '../schemas/extension.yaml#/ExtensionCollectionResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'

/api/extensions/{id}:
  get:
    tags:
      - Extensions
    summary: Get an extension
    description: Returns a single extension by id.
    operationId: getExtension
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
        description: Extension id
    responses:
      '200':
        description: Extension detail
        content:
          application/json:
            schema:
              $ref: '../schemas/extension.yaml#/ExtensionResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Extension not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'

/api/extensions/{id}/runners:
  get:
    tags:
      - Extensions
    summary: List runners for an extension
    description: >
      Returns all runners belonging to the given extension, ordered by id.
      Returns 404 if the extension does not exist.
    operationId: listExtensionRunners
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
        description: Extension id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          example: 20
        description: Maximum number of results to return
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          example: 0
        description: Number of results to skip
    responses:
      '200':
        description: Runner list
        content:
          application/json:
            schema:
              $ref: '../schemas/extension.yaml#/RunnerCollectionResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Extension not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'

/api/extensions/{id}/runners/{runner_id}:
  get:
    tags:
      - Extensions
    summary: Get a runner
    description: >
      Returns a single runner by runner_id within the given extension.
      Returns 404 if either the extension or the runner does not exist.
    operationId: getExtensionRunner
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
        description: Extension id
      - name: runner_id
        in: path
        required: true
        schema:
          type: integer
          example: 10
        description: Runner id
    responses:
      '200':
        description: Runner detail
        content:
          application/json:
            schema:
              $ref: '../schemas/extension.yaml#/RunnerResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Extension or runner not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'

/api/extensions/{id}/runners/{runner_id}/functions:
  get:
    tags:
      - Extensions
    summary: List functions for a runner
    description: >
      Returns all functions belonging to the given runner, ordered by id.
      Returns 404 if the extension or runner does not exist.
    operationId: listRunnerFunctions
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
        description: Extension id
      - name: runner_id
        in: path
        required: true
        schema:
          type: integer
          example: 10
        description: Runner id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          example: 20
        description: Maximum number of results to return
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          example: 0
        description: Number of results to skip
    responses:
      '200':
        description: Function list
        content:
          application/json:
            schema:
              $ref: '../schemas/extension.yaml#/FunctionCollectionResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Extension or runner not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'

/api/extensions/{id}/runners/{runner_id}/functions/{function_id}:
  get:
    tags:
      - Extensions
    summary: Get a function
    description: >
      Returns a single function by function_id within the given extension and runner.
      Returns 404 if the extension, runner, or function does not exist.
    operationId: getRunnerFunction
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
        description: Extension id
      - name: runner_id
        in: path
        required: true
        schema:
          type: integer
          example: 10
        description: Runner id
      - name: function_id
        in: path
        required: true
        schema:
          type: integer
          example: 100
        description: Function id
    responses:
      '200':
        description: Function detail
        content:
          application/json:
            schema:
              $ref: '../schemas/extension.yaml#/FunctionResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Extension, runner, or function not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'

/api/extensions/{id}/runners/{runner_id}/functions/{function_id}/invoke:
  post:
    tags:
      - Extensions
    summary: Invoke a function
    description: >
      Dispatches a task via Legion::Ingress using the runner namespace and function
      name resolved from the database. The request body is forwarded as the task
      payload. Returns 422 if the runner class is invalid.
    operationId: invokeFunction
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
        description: Extension id
      - name: runner_id
        in: path
        required: true
        schema:
          type: integer
          example: 10
        description: Runner id
      - name: function_id
        in: path
        required: true
        schema:
          type: integer
          example: 100
        description: Function id
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '../schemas/extension.yaml#/FunctionInvokeInput'
    responses:
      '201':
        description: Task created via function invocation
        content:
          application/json:
            schema:
              $ref: '../schemas/task.yaml#/TaskCreatedResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Extension, runner, or function not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '422':
        description: Invalid runner class
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
